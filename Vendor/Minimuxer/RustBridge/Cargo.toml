[package]
name = "rust_bridge"
version = "1.0.0"
edition = "2021"

[dependencies]
# iOS 17+ remote-pairing operations. Seal intentionally supports only the
# pure-Rust RSD path; the legacy libimobiledevice bridge is not linked.
plist = "1.7.1"
tokio = { version = "1", features = ["rt", "rt-multi-thread", "net", "io-util", "time"] }
once_cell = "1"
log = "0.4"

[dependencies.idevice]
git = "https://github.com/jkcoxson/idevice"
rev = "a714d35d95dc16769f8a54a6168ccec6338b73c7"
default-features = false
features = [
  "afc",
  "debug_proxy",
  "dvt",
  "heartbeat",
  "installation_proxy",
  "misagent",
  "mobile_image_mounter",
  "remote_pairing",
  "rsd",
  "tcp",
  "tunnel_tcp_stack",
]

[lib]
crate-type = ["staticlib"]
name = "rust_bridge"
