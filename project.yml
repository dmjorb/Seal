name: Seal
options:
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "16.0"
configs:
  Debug: debug
  Release: release
configFiles:
  Debug: Config/Debug.xcconfig
  Release: Config/Release.xcconfig
packages:
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation
    exactVersion: 0.9.20
  AltSign:
    url: https://github.com/SideStore/AltSign
    revision: 55ba33ca500831279c3c702132a7515063029ed2
  Minimuxer:
    path: Vendor/Minimuxer
targets:
  Seal:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Seal
    dependencies:
      - package: ZIPFoundation
      - package: AltSign
        product: AltSign-Static
      - package: Minimuxer
      - target: DeviceSupport
    info:
      path: Seal/Resources/Info.plist
      properties:
        CFBundleDisplayName: Seal
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        SealOriginalBundleIdentifier: com.mjorb.seal
        CFBundleURLTypes:
          - CFBundleURLName: com.mjorb.seal
            CFBundleURLSchemes:
              - seal
        CFBundleDocumentTypes:
          - CFBundleTypeName: IPA Archive
            CFBundleTypeRole: Viewer
            LSHandlerRank: Owner
            LSItemContentTypes:
              - com.apple.itunes.ipa
              - public.zip-archive
              - public.data
        LSSupportsOpeningDocumentsInPlace: true
        UTImportedTypeDeclarations:
          - UTTypeIdentifier: com.apple.itunes.ipa
            UTTypeDescription: iOS App Archive
            UTTypeConformsTo:
              - public.zip-archive
              - public.data
            UTTypeTagSpecification:
              public.filename-extension:
                - ipa
              public.mime-type:
                - application/octet-stream
                - application/x-itunes-ipa
        ITSAppUsesNonExemptEncryption: false
        NSLocalNetworkUsageDescription: Seal 通过本地通道连接此设备并安装应用。
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mjorb.seal
        PRODUCT_NAME: Seal
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
  DeviceSupport:
    type: library.static
    platform: iOS
    deploymentTarget: "16.0"
    dependencies:
      - package: AltSign
        product: OpenSSL
    sources:
      - path: Vendor/DeviceSupport/libimobiledevice/src
      - path: Vendor/DeviceSupport/libimobiledevice/common
      - path: Vendor/DeviceSupport/libimobiledevice-glue/src
      - path: Vendor/DeviceSupport/libplist/src
      - path: Vendor/DeviceSupport/libplist/libcnary
      - path: Vendor/DeviceSupport/libusbmuxd/src/libusbmuxd.c
    settings:
      base:
        PRODUCT_NAME: imobiledevice
        EXECUTABLE_PREFIX: lib
        SKIP_INSTALL: YES
        GCC_C_LANGUAGE_STANDARD: gnu11
        CLANG_CXX_LANGUAGE_STANDARD: c++14
        GCC_ENABLE_CPP_EXCEPTIONS: YES
        GCC_ENABLE_CPP_RTTI: YES
        GCC_WARN_INHIBIT_ALL_WARNINGS: YES
        GCC_PREPROCESSOR_DEFINITIONS:
          - $(inherited)
          - HAVE_CONFIG_H=1
          - HAVE_OPENSSL=1
          - HAVE_STPNCPY=1
          - HAVE_STPCPY=1
          - HAVE_VASPRINTF=1
          - HAVE_ASPRINTF=1
          - HAVE_GETIFADDRS=1
          - HAVE_STRNDUP=1
        HEADER_SEARCH_PATHS:
          - $(PROJECT_DIR)/Vendor/DeviceSupport
          - $(PROJECT_DIR)/Vendor/DeviceSupport/libplist/include
          - $(PROJECT_DIR)/Vendor/DeviceSupport/libplist/src
          - $(PROJECT_DIR)/Vendor/DeviceSupport/libplist/libcnary/include
          - $(PROJECT_DIR)/Vendor/DeviceSupport/libimobiledevice
          - $(PROJECT_DIR)/Vendor/DeviceSupport/libimobiledevice/include
          - $(PROJECT_DIR)/Vendor/DeviceSupport/libimobiledevice/src
          - $(PROJECT_DIR)/Vendor/DeviceSupport/libusbmuxd/include
          - $(PROJECT_DIR)/Vendor/DeviceSupport/libimobiledevice-glue/include
  SealTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: SealTests
    dependencies:
      - target: Seal
      - package: ZIPFoundation
      - package: Minimuxer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mjorb.seal.tests
        GENERATE_INFOPLIST_FILE: YES
  SealUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: SealUITests
    dependencies:
      - target: Seal
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mjorb.seal.uitests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  Seal:
    build:
      targets:
        Seal: all
        SealTests: [test]
        SealUITests: [test]
    test:
      gatherCoverageData: true
      targets:
        - SealTests
        - SealUITests
